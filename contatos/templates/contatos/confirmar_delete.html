{% extends 'contatos/base.html' %}

{% block content %}
    <h2>Deletar Contato</h2>
    <p>Tem certeza que deseja deletar <strong>{{ contato.nome }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirmar</button>
        <a href="{% url 'contatos:listar' %}">Cancelar</a>
    </form>
{% endblock %}
